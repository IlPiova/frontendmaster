<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main>
      <section class="profile-section">
        <div class="light-section">
          <img src="./images/image-jeremy.png" alt="profile-image" />
          <p class="secondary-text">Report for</p>
          <div class="profile-info">
            <p class="user-info">Jeremy</p>
            <p class="user-info">Robson</p>
          </div>
        </div>
        <div class="dark-section" id="dark-section">
          <ul class="timestamp-selection">
            <li class="timespan-item" id="daily">Daily</li>
            <li class="timespan-item" id="weekly">Weekly</li>
            <li class="timespan-item" id="monthly">Monthly</li>
          </ul>
        </div>
      </section>
      <section class="cards-section">
        <div class="card" id="work">
          <div class="inner-card">
            <div class="inner-card-head">
              <h2>Work</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt="decorative-ellipsis-icon"
              />
            </div>
            <p class="time-score"></p>
            <p class="last-score"></p>
          </div>
        </div>
        <div class="card" id="play">
          <div class="inner-card">
            <div class="inner-card-head">
              <h2>Play</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt="decorative-ellipsis-icon"
              />
            </div>
            <p class="time-score"></p>
            <p class="last-score"></p>
          </div>
        </div>
        <div class="card" id="study">
          <div class="inner-card">
            <div class="inner-card-head">
              <h2>Study</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt="decorative-ellipsis-icon"
              />
            </div>
            <p class="time-score"></p>
            <p class="last-score"></p>
          </div>
        </div>
        <div class="card" id="exercise">
          <div class="inner-card">
            <div class="inner-card-head">
              <h2>Exercise</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt="decorative-ellipsis-icon"
              />
            </div>
            <p class="time-score"></p>
            <p class="last-score"></p>
          </div>
        </div>
        <div class="card" id="social">
          <div class="inner-card">
            <div class="inner-card-head">
              <h2>Social</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt="decorative-ellipsis-icon"
              />
            </div>
            <p class="time-score"></p>
            <p class="last-score"></p>
          </div>
        </div>
        <div class="card" id="self-care">
          <div class="inner-card">
            <div class="inner-card-head">
              <h2>Self Care</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt="decorative-ellipsis-icon"
              />
            </div>
            <p class="time-score"></p>
            <p class="last-score"></p>
          </div>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
